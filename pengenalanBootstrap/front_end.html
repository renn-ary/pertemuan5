<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Website Blog</title>
  </head>
  <body>
    <div class="container">
      <header
        class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom"
      >
        <a
          href="/"
          class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-dark text-decoration-none"
        >
          <span class="fs-4">My Blog</span>
        </a>
        <ul class="nav nav-pills">
          <li class="nav-item">
            <a href="#" class="nav-link active" aria-current="page">Beranda</a>
          </li>

          <li class="nav-item"><a href="#" class="nav- link">Artikel</a></li>

          <li class="nav-item"><a href="#" class="nav- link">About</a></li>
        </ul>
      </header>
    </div>
    <main class="container">
      <!-- Header Gambar -->
      <div class="p-4 p-md-5 mb-4 text-white rounded bg-dark">
        <div class="col-md-6 px-0">
          <h1 class="display-4 fst-italic">Judul Blog Utama</h1>
          <p class="lead my-3">Deskripsi singkat blog yang menarik.</p>
        </div>
      </div>
      <!-- Konten 2 Kolom -->
      <div class="row g-5">
        <!-- Kolom Artikel -->

        <div class="col-md-8">
          <h3 class="pb-4 mb-4 fst-italic border- bottom">Artikel Terbaru</h3>

          <article class="blog-post">
            <h2 class="blog-post-title">Contoh Artikel 1</h2>
            <p class="blog-post-meta">
              January 1, 2024 by <a href="#">Admin</a>
            </p>
            <p>Isi artikel disini...</p>
          </article>
        </div>
        <!-- Kolom Sidebar -->
        <div class="col-md-4">
          <div class="p-4 mb-3 bg-light rounded">
            <h4>About</h4>

            <p>Informasi tentang penulis blog.</p>
          </div>
        </div>
      </div>
    </main>
    <footer class="blog-footer text-center py-4 bg-light mt-5">
      <p>
        Template built for <a href="https://getbootstrap.com/">Bootstrap</a> by
        <a href="https://twitter.com/mdo">@mdo</a>.
      </p>
      <p><a href="#">Back to top</a></p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
